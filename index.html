<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="card">
      <div class="logo">🍑</div>
      
      <div id="loadingScreen">
        <h2 id="statusText">Connecting to LINE...</h2>
      </div>

      <div id="registrationScreen" style="display: none;">
        <h2 id="regFormTitle">Register</h2>
        <p id="regFormDesc">Please complete your profile to continue.</p>
        <form id="regForm" data-mode="register">
          <input type="text" id="regFullName" placeholder="Full Name (Required)" required>
          <input type="email" id="regEmail" placeholder="Email (Gmail Only - Required)" required>
          <input type="text" id="regEmployeeId" placeholder="Employee ID">
          <input type="text" id="regPosition" placeholder="Position">
          <input type="text" id="regAssignedPost" placeholder="Assigned Post สำนักงานใหญ่/กฟข./กฟฟ.">
          <input type="text" id="regDivision" placeholder="Division กอง">
          <input type="text" id="regSupervisor" placeholder="Supervisor Position ตำแหน่งผู้อนุมัติ">
          <input type="tel" id="regWorkPhone" placeholder="Work Phone">
          <input type="text" id="regAliases" placeholder="Aliases (comma separated)">
          <p style="font-size: 13px;">Date of Hire</p>
          <input type="date" id="regDateOfHire" placeholder="Date of Hire">
          <button type="submit" id="regSubmitBtn" class="btn primary">Complete Registration</button>
          <button type="button" id="regCancelBtn" class="btn secondary" style="display: none;">Cancel</button>
        </form>
      </div>

      <div id="dashboardScreen" style="display: none;">
        <h2 id="welcomeText">Welcome!</h2>
        <button id="editProfileBtn" class="btn secondary" style="margin-bottom: 20px;">Edit Profile</button>
        <div class="section">
          <h3>Add Relative</h3>
          <form id="addRelativeForm" data-mode="add">
            <input type="text" id="relFullName" placeholder="Relative Full Name" required>
            <input type="text" id="relRelation" placeholder="Relation (e.g., Mother)" required>
            <input type="text" id="relOccupation" placeholder="Occupation" required>
            <input type="text" id="relWorkplace" placeholder="Workplace" required>
            <input type="text" id="relAliases" placeholder="Aliases (comma separated)">
            <button type="submit" id="relSubmitBtn" class="btn secondary">Add Relative</button>
            <button type="button" id="relCancelBtn" class="btn secondary" style="display: none;">Cancel</button>
          </form>
        </div>

        <div class="section">
          <h3>Your Relatives</h3>
          <div id="relativesList">
            <p>Loading relatives...</p>
          </div>
        </div>
      </div>

    </div>

    <script type="module" src="myLiff.js"></script>

  </body>
</html>
